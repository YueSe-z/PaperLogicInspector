<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>论文逻辑审查助手</title>
<style>
  :root { --bg: #f5f5f5; --card: #fff; --text: #333; --sub: #666; --border: #e0e0e0; --accent: #2563eb; --accent-hover: #1d4ed8; --danger: #dc2626; --warn: #f59e0b; --ok: #16a34a; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; min-height: 100vh; }
  .container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }
  header { text-align: center; margin-bottom: 28px; }
  header h1 { font-size: 24px; font-weight: 700; }
  header p { color: var(--sub); font-size: 14px; margin-top: 4px; }

  textarea { width: 100%; min-height: 220px; padding: 14px 16px; border: 2px solid var(--border); border-radius: 10px; font-size: 15px; font-family: inherit; resize: vertical; line-height: 1.8; transition: border-color .2s; }
  textarea:focus { outline: none; border-color: var(--accent); }

  .btn-row { display: flex; gap: 10px; margin-top: 14px; }
  button { padding: 10px 28px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all .2s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
  .btn-secondary { background: var(--border); color: var(--text); }
  .btn-secondary:hover { background: #d0d0d0; }

  .status { margin-top: 12px; font-size: 14px; color: var(--sub); min-height: 20px; }

  .result { display: none; margin-top: 24px; }
  .card { background: var(--card); border-radius: 10px; padding: 20px 24px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
  .card h3 { font-size: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .card h3 .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .dot-s { background: var(--accent); }
  .dot-i { background: var(--warn); }
  .dot-r { background: var(--ok); }

  .card .content { white-space: pre-wrap; font-size: 14px; color: var(--text); }
  .card .content:empty::after { content: "—"; color: #ccc; }

  .error { background: #fef2f2; color: var(--danger); padding: 14px 18px; border-radius: 8px; font-size: 14px; display: none; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>论文逻辑审查助手</h1>
    <p>粘贴论文段落 — AI 自动拆解结构、检查逻辑问题、给出改写建议</p>
  </header>

  <textarea id="input" placeholder="在此粘贴论文段落（支持中英文，可输入整篇论文）..."></textarea>
  <div class="btn-row">
    <button class="btn-primary" id="btnAnalyze" onclick="doAnalyze()">开始分析</button>
    <button class="btn-secondary" onclick="clearAll()">清空</button>
  </div>
  <div class="status" id="status"></div>
  <div class="error" id="error"></div>

  <div class="result" id="result">
    <div class="card">
      <h3><span class="dot dot-s"></span>段落结构拆解</h3>
      <div class="content" id="structure"></div>
    </div>
    <div class="card">
      <h3><span class="dot dot-i"></span>逻辑问题检查</h3>
      <div class="content" id="issues"></div>
    </div>
    <div class="card">
      <h3><span class="dot dot-r"></span>改写建议</h3>
      <div class="content" id="suggestions"></div>
    </div>
  </div>
</div>

<script>
async function doAnalyze() {
  const text = document.getElementById('input').value.trim();
  if (!text) return;

  const btn = document.getElementById('btnAnalyze');
  const status = document.getElementById('status');
  const error = document.getElementById('error');
  const result = document.getElementById('result');

  btn.disabled = true;
  status.textContent = '正在分析，请稍候...';
  error.style.display = 'none';
  result.style.display = 'none';
  document.getElementById('structure').textContent = '';
  document.getElementById('issues').textContent = '';
  document.getElementById('suggestions').textContent = '';

  try {
    const resp = await fetch('/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    const data = await resp.json();

    if (!resp.ok) { throw new Error(data.error || '请求失败'); }

    document.getElementById('structure').textContent = data.structure;
    document.getElementById('issues').textContent = data.issues;
    document.getElementById('suggestions').textContent = data.suggestions || '未发现明显逻辑问题，无需改写。';
    result.style.display = 'block';
    status.textContent = '分析完成';
  } catch (e) {
    error.textContent = e.message;
    error.style.display = 'block';
    status.textContent = '';
  } finally {
    btn.disabled = false;
  }
}

function clearAll() {
  document.getElementById('input').value = '';
  document.getElementById('result').style.display = 'none';
  document.getElementById('error').style.display = 'none';
  document.getElementById('status').textContent = '';
  document.getElementById('structure').textContent = '';
  document.getElementById('issues').textContent = '';
  document.getElementById('suggestions').textContent = '';
}
</script>
</body>
</html>
